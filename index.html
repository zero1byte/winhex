<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexWood - File Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-slate-800 py-5 px-8 border-b border-slate-700">
        <h1 class="text-2xl font-semibold text-center tracking-wide text-slate-100">HexWood File Analyzer</h1>
        <p class="text-center text-slate-400 mt-1 text-sm">Analyze files in Hexadecimal, Binary & Octal formats</p>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full px-6 py-6">
        <!-- File Input Section -->
        <div class="bg-slate-800 rounded-lg p-5 shadow-md mb-6 border border-slate-700">
            <form action="" id="fileForm" class="flex flex-col sm:flex-row items-center gap-4">
                <label for="fileInput" class="text-sm font-medium text-slate-300">
                    <!-- Select a file to analyze: -->
                </label>
                <input id="fileInput" type="file" accept="*" name="file"
                    class="flex-1 text-sm text-slate-300 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-medium file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 file:cursor-pointer cursor-pointer">
            </form>

            <!-- File Info -->
            <div id="fileInfo" class="hidden mt-4 p-3 bg-slate-700/50 rounded border border-slate-600">
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 text-sm">
                    <div><span class="text-slate-400">Name:</span> <span id="fileName"
                            class="text-slate-200 font-mono ml-1"></span></div>
                    <div><span class="text-slate-400">Size:</span> <span id="fileSize"
                            class="text-slate-200 font-mono ml-1"></span></div>
                    <div><span class="text-slate-400">Type:</span> <span id="fileType"
                            class="text-slate-200 font-mono ml-1"></span></div>
                </div>
            </div>
        </div>

        <!-- View Mode Buttons and Controls -->
        <div class="flex flex-wrap items-center justify-between gap-4 mb-4">
            <div class="flex flex-wrap gap-2">
                <button id="btnHex" data-mode="hex"
                    class="view-btn px-5 py-2 rounded text-sm font-medium transition-all duration-200 bg-indigo-600 hover:bg-indigo-700 border border-indigo-500">
                    Hexadecimal
                </button>
                <button id="btnBinary" data-mode="binary"
                    class="view-btn px-5 py-2 rounded text-sm font-medium transition-all duration-200 bg-slate-700 hover:bg-slate-600 border border-slate-600">
                    Binary
                </button>
                <button id="btnOctal" data-mode="octal"
                    class="view-btn px-5 py-2 rounded text-sm font-medium transition-all duration-200 bg-slate-700 hover:bg-slate-600 border border-slate-600">
                    Octal
                </button>
                <button id="btnStrings" data-mode="strings"
                    class="view-btn px-5 py-2 rounded text-sm font-medium transition-all duration-200 bg-slate-700 hover:bg-slate-600 border border-slate-600">
                    Strings
                </button>
            </div>
            <div class="flex items-center gap-2">
                <label for="bytesPerPage" class="text-sm text-slate-400">Bytes per page:</label>
                <select id="bytesPerPage"
                    class="bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
                    <option value="256">256</option>
                    <option value="512" selected>512</option>
                    <option value="1024">1024</option>
                    <option value="2048">2048</option>
                    <option value="4096">4096</option>
                </select>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="bg-slate-800 rounded-lg p-4 shadow-md mb-4 border border-slate-700">
            <div class="flex flex-wrap items-center gap-3">
                <div class="flex-1 min-w-[200px]">
                    <input type="text" id="searchInput" placeholder="Search hex (e.g., 4D 5A), ASCII, or offset..."
                        class="w-full bg-slate-700 border border-slate-600 rounded px-4 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500">
                </div>
                <select id="searchType"
                    class="bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
                    <option value="hex">Hex Values</option>
                    <option value="ascii">ASCII Text</option>
                    <option value="offset">Offset</option>
                </select>
                <button id="btnSearch"
                    class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 rounded text-sm font-medium transition-all duration-200 border border-indigo-500 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    Search
                </button>
                <button id="btnClearSearch"
                    class="px-4 py-2 bg-slate-600 hover:bg-slate-500 rounded text-sm font-medium transition-all duration-200 border border-slate-500">
                    Clear
                </button>
            </div>
            <div id="searchResults" class="hidden mt-3 flex items-center gap-3 text-sm">
                <span id="searchInfo" class="text-slate-400"></span>
                <div class="flex items-center gap-2">
                    <button id="btnPrevMatch"
                        class="px-3 py-1 bg-slate-600 hover:bg-slate-500 rounded text-xs font-medium transition-all border border-slate-500 disabled:opacity-40 disabled:cursor-not-allowed"
                        disabled>
                        ◀ Prev
                    </button>
                    <button id="btnNextMatch"
                        class="px-3 py-1 bg-slate-600 hover:bg-slate-500 rounded text-xs font-medium transition-all border border-slate-500 disabled:opacity-40 disabled:cursor-not-allowed"
                        disabled>
                        Next ▶
                    </button>
                </div>
            </div>
        </div>

        <!-- Output Display Section -->
        <div class="bg-slate-800 rounded-lg shadow-md border border-slate-700 overflow-hidden flex flex-col">
            <div class="flex items-center justify-between px-4 py-3 bg-slate-700/80 border-b border-slate-700">
                <h2 id="viewTitle" class="text-sm font-medium text-slate-200">Hexadecimal View</h2>
                <span id="byteCount" class="text-xs text-slate-400 bg-slate-600/50 px-2 py-1 rounded"></span>
            </div>
            <!-- Split view container -->
            <div class="flex flex-1" style="max-height: 55vh;">
                <!-- Left: Offset + Data (scrollable) -->
                <div class="flex-1 overflow-auto" id="dataScrollContainer">
                    <table id="dataTable" class="border-collapse font-mono text-xs w-full">
                        <thead class="bg-slate-700/80 sticky top-0 z-10">
                            <tr>
                                <th
                                    class="px-4 py-2.5 text-left text-slate-300 font-semibold border-r border-slate-600 w-24 bg-slate-700/80 whitespace-nowrap">
                                    Offset</th>
                                <th
                                    class="px-4 py-2.5 text-left text-slate-300 font-semibold bg-slate-700/80 whitespace-nowrap">
                                    Data</th>
                            </tr>
                        </thead>
                        <tbody id="dataView" class="text-slate-300">
                            <tr>
                                <td colspan="2" class="px-4 py-12 text-center text-slate-500">Select a file to see its
                                    contents...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <!-- Right: ASCII (fixed) -->
                <div class="w-44 flex-shrink-0 border-l border-slate-600 overflow-y-auto bg-slate-800"
                    id="asciiScrollContainer">
                    <table class="border-collapse font-mono text-xs w-full">
                        <thead class="bg-slate-700/80 sticky top-0 z-10">
                            <tr>
                                <th class="px-4 py-2.5 text-left text-slate-300 font-semibold bg-slate-700/80">ASCII
                                </th>
                            </tr>
                        </thead>
                        <tbody id="asciiView" class="text-indigo-400">
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- Fixed Pagination Footer -->
            <div class="bg-slate-700/80 border-t border-slate-600 px-4 py-3">
                <div class="flex items-center justify-between">
                    <button id="btnPrevious"
                        class="px-4 py-2 bg-slate-600 hover:bg-slate-500 rounded text-sm font-medium transition-all duration-200 border border-slate-500 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-slate-600 flex items-center gap-2"
                        disabled>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                            </path>
                        </svg>
                        Previous
                    </button>
                    <span id="pageInfo"
                        class="text-slate-300 text-sm font-medium bg-slate-600/50 px-3 py-1 rounded">Page 1 of 1</span>
                    <button id="btnNext"
                        class="px-4 py-2 bg-slate-600 hover:bg-slate-500 rounded text-sm font-medium transition-all duration-200 border border-slate-500 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-slate-600 flex items-center gap-2"
                        disabled>
                        Next
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-800 py-3 text-center text-slate-500 text-xs border-t border-slate-700">
        <p>HexWood &copy; 2026 | Designed by <a href="https://github.com/Zero1Byte" target="_blank"
                class="text-indigo-400 hover:text-indigo-300 transition-colors">Zero1Byte</a></p>
    </footer>
</body>
<script src="./scripts/index.js"></script>

</html>
